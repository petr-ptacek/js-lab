name: Deploy documentation

on:
  push:
    tags:
      - '@petr-ptacek/js-core@*'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare site
        run: mkdir -p site

      - name: Build root docs
        run: pnpm docs:build

      - name: Copy root docs
        run: cp -r docs/.vitepress/dist/* site

      - name: Build js-core docs
        run: pnpm docs:js-core

      - name: Copy js-core docs
        run: |
          if [ -d "packages/js-core/docs/.vitepress/dist" ]; then
            mkdir -p site/js-core
            cp -r packages/js-core/docs/.vitepress/dist/* site/js-core
          fi

      - name: Validate site
        run: |
          if [ ! -f "site/index.html" ]; then
            echo "Root docs missing"
            exit 1
          fi

      - name: Add SPA fallback
        run: |
          cp site/index.html site/404.html
          if [ -f "site/js-core/index.html" ]; then
            cp site/js-core/index.html site/js-core/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
