name: Deploy documentation

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build js-core docs
        run: pnpm docs:js-core

      - name: Move js-core docs
        run: |
          mkdir site
          cp -r packages/js-core/docs/.vitepress/dist site/js-core

      #      - name: Build vue-core docs
      #        run: pnpm --filter "@petr-ptacek/vue-core" run docs:build
      #
      #      - name: Move vue-core docs
      #        run: cp -r packages/vue-core/docs/.vitepress/dist site/vue-core

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
